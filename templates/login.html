{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
    .login-container {
        max-width: 420px;
        margin: 60px auto;
        padding: 40px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 32px;
    }
    
    .login-header h1 {
        font-size: 1.8rem;
        margin: 0 0 8px;
        color: var(--text);
    }
    
    .login-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin: 0;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 8px;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        transition: all 0.2s;
        box-sizing: border-box;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: rgba(255, 64, 35, 0.5);
        background: rgba(255, 64, 35, 0.02);
    }
    
    .form-group input::placeholder {
        color: var(--text-dim);
    }
    
    .form-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, rgba(255, 64, 35, 0.9), rgba(255, 100, 50, 0.9));
        border: 1px solid rgba(255, 64, 35, 0.5);
        border-radius: var(--radius-sm);
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
    }
    
    .form-submit:hover {
        background: linear-gradient(135deg, rgba(255, 64, 35, 1), rgba(255, 100, 50, 1));
        box-shadow: 0 8px 24px rgba(255, 64, 35, 0.25);
    }
    
    .form-submit:active {
        transform: scale(0.98);
    }
    
    .form-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }
    
    .error-message {
        background: rgba(255, 64, 35, 0.1);
        border: 1px solid rgba(255, 64, 35, 0.3);
        color: rgba(255, 100, 100, 1);
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        margin-bottom: 20px;
        display: none;
    }
    
    .error-message.show {
        display: block;
    }
    
    .form-footer {
        text-align: center;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
    }
    
    .form-footer p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 0;
    }
    
    .form-footer a {
        color: rgba(255, 64, 35, 0.8);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }
    
    .form-footer a:hover {
        color: rgba(255, 64, 35, 1);
    }
    
    .tab-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--border);
    }
    
    .tab-btn {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-weight: 500;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        font-size: 0.95rem;
    }
    
    .tab-btn.active {
        color: var(--text);
        border-bottom-color: rgba(255, 64, 35, 0.8);
    }
    
    .tab-btn:hover {
        color: var(--text);
    }
    
    .tab-content {
        display: none;
    }
    
    .tab-content.active {
        display: block;
    }
</style>

<div class="login-container">
    <div class="login-header">
        <h1>IRIS Agent</h1>
        <p>Agente de segurança com IA</p>
    </div>
    
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
        <button class="tab-btn" onclick="switchTab('register')">Criar conta</button>
    </div>
    
    <!-- Tab: Login -->
    <div id="login-tab" class="tab-content active">
        <div class="error-message" id="login-error"></div>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-username">Usuário</label>
                <input 
                    type="text" 
                    id="login-username" 
                    placeholder="seu_usuario" 
                    required
                    autocomplete="username"
                >
            </div>
            
            <div class="form-group">
                <label for="login-password">Senha</label>
                <input 
                    type="password" 
                    id="login-password" 
                    placeholder="••••••••" 
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="form-submit" id="login-submit">Entrar</button>
        </form>

        <div class="form-footer">
            <p><a href="#" onclick="openForgotModal(event)">Esqueci minha senha</a></p>
        </div>
    </div>
    
    <!-- Tab: Registro -->
    <div id="register-tab" class="tab-content">
        <div class="error-message" id="register-error"></div>
        
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="register-username">Usuário</label>
                <input 
                    type="text" 
                    id="register-username" 
                    placeholder="seu_usuario" 
                    required
                    autocomplete="username"
                >
            </div>
            
            <div class="form-group">
                <label for="register-email">Email</label>
                <input 
                    type="email" 
                    id="register-email" 
                    placeholder="seu@email.com" 
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="register-password">Senha</label>
                <input 
                    type="password" 
                    id="register-password" 
                    placeholder="••••••••" 
                    required
                    autocomplete="new-password"
                >
            </div>
            
            <div class="form-group">
                <label for="register-password-confirm">Confirmar senha</label>
                <input 
                    type="password" 
                    id="register-password-confirm" 
                    placeholder="••••••••" 
                    required
                    autocomplete="new-password"
                >
            </div>
            
            <button type="submit" class="form-submit" id="register-submit">Criar conta</button>
        </form>
    </div>
</div>

<!-- Modal: Esqueci minha senha -->
<div id="forgot-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div style="max-width:380px; width:90%; padding:32px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);">
        <h2 style="margin:0 0 8px; color:var(--text); font-size:1.3rem;">Recuperar senha</h2>
        <p style="color:var(--text-muted); font-size:0.9rem; margin:0 0 20px;">Informe seu email e geraremos um link de recuperação.</p>

        <div class="error-message" id="forgot-error"></div>
        <div class="success-message" id="forgot-success" style="background:rgba(80,200,120,0.1); border:1px solid rgba(80,200,120,0.3); color:rgba(120,220,150,1); padding:12px 14px; border-radius:var(--radius-sm); font-size:0.9rem; margin-bottom:16px; display:none; word-break:break-all;"></div>

        <form onsubmit="handleForgotPassword(event)">
            <div class="form-group">
                <label for="forgot-email">Email</label>
                <input type="email" id="forgot-email" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <button type="submit" class="form-submit" id="forgot-submit">Enviar link de recuperação</button>
        </form>

        <div class="form-footer">
            <p><a href="#" onclick="closeForgotModal(event)">Cancelar</a></p>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function switchTab(tab) {
    // Remove active de todos os tabs
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    // Ativa o tab selecionado
    document.getElementById(tab + '-tab').classList.add('active');
    event.target.classList.add('active');
}

async function handleLogin(e) {
    e.preventDefault();
    
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-submit');
    const errorDiv = document.getElementById('login-error');
    
    btn.disabled = true;
    btn.textContent = 'Entrando…';
    errorDiv.classList.remove('show');
    
    try {
        const res = await secureFetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        
        const data = await res.json();
        
        if (data.success) {
            // Redireciona para o agente
            window.location.href = '/agent';
        } else {
            errorDiv.textContent = data.error || 'Erro ao fazer login';
            errorDiv.classList.add('show');
        }
    } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.add('show');
    }
    
    btn.disabled = false;
    btn.textContent = 'Entrar';
}

async function handleRegister(e) {
    e.preventDefault();
    
    const username = document.getElementById('register-username').value;
    const email = document.getElementById('register-email').value;
    const password = document.getElementById('register-password').value;
    const passwordConfirm = document.getElementById('register-password-confirm').value;
    const btn = document.getElementById('register-submit');
    const errorDiv = document.getElementById('register-error');
    
    if (password !== passwordConfirm) {
        errorDiv.textContent = 'As senhas não conferem';
        errorDiv.classList.add('show');
        return;
    }
    
    btn.disabled = true;
    btn.textContent = 'Criando…';
    errorDiv.classList.remove('show');
    
    try {
        const res = await secureFetch('/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, email, password})
        });
        
        const data = await res.json();
        
        if (data.success) {
            // Auto-login após registro
            document.getElementById('login-username').value = username;
            document.getElementById('login-password').value = password;
            switchTab('login');
            errorDiv.classList.remove('show');
            // Simula submit do login
            setTimeout(() => document.querySelector('#login-tab form').dispatchEvent(new Event('submit')), 300);
        } else {
            errorDiv.textContent = data.error || 'Erro ao criar conta';
            errorDiv.classList.add('show');
        }
    } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.add('show');
    }
    
    btn.disabled = false;
    btn.textContent = 'Criar conta';
}

function openForgotModal(e) {
    e.preventDefault();
    document.getElementById('forgot-modal').style.display = 'flex';
    document.getElementById('forgot-error').classList.remove('show');
    document.getElementById('forgot-success').style.display = 'none';
}

function closeForgotModal(e) {
    e.preventDefault();
    document.getElementById('forgot-modal').style.display = 'none';
}

async function handleForgotPassword(e) {
    e.preventDefault();

    const email = document.getElementById('forgot-email').value;
    const btn = document.getElementById('forgot-submit');
    const errorDiv = document.getElementById('forgot-error');
    const successDiv = document.getElementById('forgot-success');

    btn.disabled = true;
    btn.textContent = 'Enviando…';
    errorDiv.classList.remove('show');
    successDiv.style.display = 'none';

    try {
        const res = await secureFetch('/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        });

        const data = await res.json();

        if (data.success) {
            if (data.reset_link) {
                // Sem SMTP configurado ainda: mostra o link diretamente.
                successDiv.innerHTML = 'Link de recuperação gerado:<br><a href="' + data.reset_link + '" style="color:inherit;">' + data.reset_link + '</a>';
            } else {
                successDiv.textContent = data.message || 'Se o email existir, um link foi enviado.';
            }
            successDiv.style.display = 'block';
        } else {
            errorDiv.textContent = data.error || 'Erro ao solicitar recuperação';
            errorDiv.classList.add('show');
        }
    } catch (err) {
        errorDiv.textContent = 'Erro de conexão com o servidor';
        errorDiv.classList.add('show');
    }

    btn.disabled = false;
    btn.textContent = 'Enviar link de recuperação';
}
</script>
{% endblock %}
